name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Download dependencies
        run: go mod download

      - name: Run CI task
        run: task ci
